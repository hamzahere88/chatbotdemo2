<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .page-label {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 500;
    }
    .chat-shell {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 620px;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
    }
    .avatar-wrap {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1D9E75, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      position: relative;
      flex-shrink: 0;
      color: #fff;
    }
    .online-dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid #fff;
      position: absolute;
      bottom: 0; right: 0;
    }
    .header-text { flex: 1; }
    .bot-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .bot-status { font-size: 12px; color: #22c55e; margin-top: 1px; }
    .powered {
      font-size: 11px;
      background: #fff3e0;
      color: #e65100;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .msg-av.ai { background: #e0f7ef; color: #0f6e56; }
    .msg-av.hu { background: #dbeafe; color: #1d4ed8; }
    .msg-content { max-width: 80%; }
    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .bubble.ai {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }
    .bubble.user {
      background: #1D9E75;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
      padding: 0 2px;
    }
    .msg-row.user .msg-time { text-align: right; }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #1D9E75;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    .suggestions {
      padding: 6px 16px 2px;
      display: flex; gap: 7px; flex-wrap: wrap;
    }
    .chip {
      font-size: 12px; font-family: 'Outfit', sans-serif;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #4b5563;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { background: #f0fdf4; border-color: #1D9E75; color: #0f6e56; }
    .input-bar {
      padding: 12px 14px;
      border-top: 1px solid #f0f0f0;
      display: flex; gap: 8px; align-items: flex-end;
      background: #fff;
    }
    #chatInput {
      flex: 1;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      background: #f8fafc;
      color: #1a1a1a;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    #chatInput:focus { border-color: #1D9E75; background: #fff; }
    #chatInput::placeholder { color: #9ca3af; }
    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 50%; border: none;
      background: #1D9E75;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #sendBtn:hover { background: #0f6e56; }
    #sendBtn:active { transform: scale(0.93); }
    #sendBtn:disabled { background: #d1d5db; cursor: not-allowed; }
    .footer-note {
      margin-top: 14px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="page-label">✦ AI Chatbot Demo</div>

  <div class="chat-shell">
    <div class="chat-header">
      <div class="avatar-wrap">
        ✦
        <div class="online-dot"></div>
      </div>
      <div class="header-text">
        <div class="bot-name">Aria</div>
        <div class="bot-status">● Online · ready to help</div>
      </div>
      <div class="powered">Groq AI ⚡</div>
    </div>

    <div class="messages" id="messages">
      <div class="msg-row">
        <div class="msg-av ai">A</div>
        <div class="msg-content">
          <div class="bubble ai">Hi there! 👋 I'm Aria, your AI assistant. Ask me anything — I'm here to help!</div>
          <div class="msg-time">Just now</div>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="useSuggestion(this)">What can you do?</button>
      <button class="chip" onclick="useSuggestion(this)">Write me a tagline</button>
      <button class="chip" onclick="useSuggestion(this)">Explain AI simply</button>
    </div>

    <div class="input-bar">
      <textarea id="chatInput" placeholder="Type a message…" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="footer-note">Powered by Groq · Ultra Fast AI</div>

  <script>
    // ⚠️ PASTE YOUR GROQ API KEY HERE (from console.groq.com → API Keys)
    const API_KEY = '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';

    const messagesEl    = document.getElementById('messages');
    const inputEl       = document.getElementById('chatInput');
    const sendBtn       = document.getElementById('sendBtn');
    const suggestionsEl = document.getElementById('suggestions');

    let history   = [];
    let isLoading = false;

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(role, text) {
      const isUser = role === 'user';
      const row = document.createElement('div');
      row.className = 'msg-row' + (isUser ? ' user' : '');

      const av = document.createElement('div');
      av.className = 'msg-av ' + (isUser ? 'hu' : 'ai');
      av.textContent = isUser ? 'You' : 'A';

      const content = document.createElement('div');
      content.className = 'msg-content';

      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + (isUser ? 'user' : 'ai');
      bubble.textContent = text;

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTime();

      content.appendChild(bubble);
      content.appendChild(time);
      row.appendChild(av);
      row.appendChild(content);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row';
      row.id = 'typing-row';

      const av = document.createElement('div');
      av.className = 'msg-av ai';
      av.textContent = 'A';

      const bubble = document.createElement('div');
      bubble.className = 'bubble ai typing';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

      row.appendChild(av);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-row');
      if (t) t.remove();
    }

    function useSuggestion(btn) {
      inputEl.value = btn.textContent;
      suggestionsEl.style.display = 'none';
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      suggestionsEl.style.display = 'none';
      inputEl.value = '';
      inputEl.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      showTyping();

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'llama3-8b-8192',
            messages: [
              {
                role: 'system',
                content: 'You are Aria, a friendly and professional AI assistant in a demo chatbot. Keep responses concise (2-4 sentences) and helpful. Be warm, clear, and impressive.'
              },
              ...history
            ],
            max_tokens: 500,
            temperature: 0.7
          })
        });

        const data = await res.json();
        removeTyping();

        const reply = data.choices?.[0]?.message?.content || "Sorry, I could not get a response. Please try again.";
        addMessage('assistant', reply);
        history.push({ role: 'assistant', content: reply });

      } catch (e) {
        removeTyping();
        addMessage('assistant', 'Oops! Something went wrong. Please try again.');
      }

      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    });
  </script>
</body>
</html>
